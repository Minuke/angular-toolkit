<div class="dialog-example-container">

  <h1>Ejemplo de Diálogo con Angular Material</h1>

  <button color="primary" (click)="openDialog('300ms', '300ms')">
    Abrir diálogo con animaciones predeterminadas
  </button>
  <button color="accent" (click)="openDialog('0ms', '0ms')">
    Abrir diálogo sin animaciones
  </button>
  <button color="warn" (click)="openDialog('1500ms', '1500ms')">
    Abrir diálogo con animaciones lentas
  </button>

</div>
