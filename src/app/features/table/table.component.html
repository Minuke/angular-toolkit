<h2 class="table-title">Users</h2>
<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Email Address</th>
      <th>Phone Number</th>
      <th>City</th>
    </tr>
  </thead>
  <tbody>
    @for(user of paginatedUsers; track $index) {
      <tr>
        <td>{{ user.name }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.phone }}</td>
        <td>{{ user.city }}</td>
      </tr>
    }
  </tbody>
</table>

<div class="pagination" [ngClass]="{'hidden': isDataEmpty}">
  <button (click)="goToFirstPage()" [disabled]="!paginationService.hasPreviousPage()">
      <i class="fas fa-angle-double-left"></i> First
  </button>
  <button (click)="prevPage()" [disabled]="!paginationService.hasPreviousPage()">
      <i class="fas fa-angle-left"></i> Previous
  </button>
  
  <span class="page-info">Page {{ paginationService.getPage() }} of {{ paginationService.getTotalPages(data.length) }}</span>
  
  <button (click)="nextPage()" [disabled]="!paginationService.hasNextPage(data.length)">
      Next <i class="fas fa-angle-right"></i>
  </button>
  <button (click)="goToLastPage()" [disabled]="!paginationService.hasNextPage(data.length)">
      Last <i class="fas fa-angle-double-right"></i>
  </button>
</div>
