<div class="register">
  <div class="register__title">
    <h1 class="register__heading">Register</h1>
  </div>
  <div class="register__form">
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register__form-content">
      <div class="register__field register__field--user">
        <label for="username" class="register__label">Usuario:</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Usuario"
          autocomplete="username"
          formControlName="username"
          class="register__input"
        />
        <div *ngIf="registerForm.controls['username'].invalid && registerForm.controls['username'].touched" class="register__error">
          {{ getErrorMessage('username') }}
        </div>
      </div>
      <div class="register__field register__field--email">
        <label for="email" class="register__label">Email:</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Email"
          autocomplete="email"
          formControlName="email"
          class="register__input"
        />
        <div *ngIf="registerForm.controls['email'].invalid && registerForm.controls['email'].touched" class="register__error">
          {{ getErrorMessage('email') }}
        </div>
      </div>
      <div class="register__field register__field--first-password">
        <label for="firstPassword" class="register__label">Password:</label>
        <div class="register__input-container">
        <input
          [type]="showFirstPassword ? 'text' : 'password'"
          id="firstPassword"
          name="firstPassword"
          placeholder="Password"
          autocomplete="new-password"
          formControlName="firstPassword"
          class="register__input register__input--with-icon"
        />
        <button type="button" class="password-toggle" (click)="togglePasswordVisibility('first', $event)">
          <img [src]="showFirstPassword ? 'eye-open.svg' : 'eye-closed.svg'" alt="ddd" class="password-toggle__icon">
        </button>
      </div>
        <div *ngIf="registerForm.controls['firstPassword'].invalid && registerForm.controls['firstPassword'].touched && registerForm.controls['secondPassword'].touched" class="register__error">
          {{ getErrorMessage('firstPassword') }}
        </div>
      </div>
      <div class="register__field register__field--second-password">
        <label for="secondPassword" class="register__label">Confirm Password:</label>
        <div class="register__input-container">
        <input
          [type]="showSecondPassword ? 'text' : 'password'"
          id="secondPassword"
          name="secondPassword"
          placeholder="Confirm Password"
          autocomplete="new-password"
          formControlName="secondPassword"
          class="register__input register__input--with-icon"
        />
        <button type="button" class="password-toggle" (click)="togglePasswordVisibility('second', $event)">
          <img [src]="showSecondPassword ? 'eye-open.svg' : 'eye-closed.svg'" alt="ddd" class="password-toggle__icon">
       </button>
      </div>
      
        <div *ngIf="registerForm.controls['secondPassword'].invalid && registerForm.controls['secondPassword'].touched && registerForm.controls['secondPassword'].dirty"  class="register__error">
          {{ getErrorMessage('secondPassword') }}
        </div>
      </div>
      
      <div class="register__actions">
        <button type="submit" class="register__button" [disabled]="registerForm.invalid">Submit</button>
      </div>
    </form>
  </div>
</div>
