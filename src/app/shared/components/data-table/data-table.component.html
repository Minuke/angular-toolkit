<table>
  <thead>
    <tr>
      <th>Id</th>
      <th>Name</th>
      <th>Business Name</th>
      <th>Phone</th>
      <th>Email</th>
    </tr>
  </thead>
  <tbody>
    @for(column  of config.tableData; track column.id) {
      <tr>
        <td>{{ column.id }}</td>
        <td>{{ column.name }}</td>
        <td>{{ column.businessName }}</td>
        <td>{{ column.phone }}</td>
        <td>{{ column.email }}</td>
      </tr>
    }
  </tbody>
</table>
