<table>
  <thead>
    <tr>
      @for(column of config().columns; track $index) {
        <th>{{ column }}</th>
      }
    </tr>
  </thead>
  <tbody>
    @for (data of config().dataTable; track data.id) {
      <tr>
        @for(column of config().columns; track $index) {
          <td>{{ getValue(data, column) }}</td>  
        }
      </tr>
    }
  </tbody>
</table>
